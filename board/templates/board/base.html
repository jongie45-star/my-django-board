<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>장고 게시판</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'board_home' %}">장고 게시판</a>
            <div class="navbar-nav ms-auto">
                {% if user.is_authenticated %}
                    <span class="nav-link text-white me-3">안녕하세요, {{ user.username }}님!</span>
                    <a class="nav-item nav-link btn btn-danger btn-sm text-white" href="{% url 'logout' %}">로그아웃</a>
                {% else %}
                    <a class="nav-item nav-link" href="{% url 'login' %}">로그인</a>
                    <a class="nav-item nav-link" href="{% url 'register' %}">회원가입</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        {% block content %} {% endblock %}
    </div>
</body>
</html>
